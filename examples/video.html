<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="utf-8" />
        <title>视频插入 - Editor.md v1.7.0</title>
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="../css/editormd.css" />
        <link rel="shortcut icon" href="../images/logos/editormd-favicon-32x32.ico" type="image/x-icon" />
        <style>
            .intro { width: 90%; margin: 15px auto; padding: 15px 20px; background: #f5f7fa; border-left: 4px solid #2196F3; border-radius: 4px; font-size: 14px; line-height: 1.8; color: #555; }
            .intro h2 { margin: 0 0 8px; font-size: 16px; color: #333; }
            .intro code { background: #e8e8e8; padding: 2px 6px; border-radius: 3px; font-family: Consolas, Monaco, monospace; font-size: 12px; color: #c7254e; }
        </style>
    </head>
    <body>
        <div id="layout">
            <header>
                <h1>视频插入示例</h1>
                <p>支持 <code>[[video]]</code> 标签语法和原生 HTML5 <code>&lt;video&gt;</code> 标签嵌入视频</p>
            </header>
            <div class="intro">
                <h2>使用说明</h2>
                <p>使用 <code>[[video]]</code> 标签包裹视频 URL，即可在预览区渲染为 HTML5 视频播放器。支持本地视频文件和远程 URL。</p>
                <p>也可直接使用原生 <code>&lt;video&gt;</code> 标签，Editor.md 的 HTML 标签解析功能会保留其属性。</p>
                <p>点击工具栏 <i class="fa fa-video-camera"></i> 视频按钮可快速插入视频标签模板。</p>
            </div>
            <div id="test-editormd">
                <textarea style="display:none;"># 视频插入示例

## 1. video 标签语法

使用 `[[video]]` 和 `[[/video]]` 包裹视频 URL：

[[video]]
./demo.mp4
[[/video]]

## 2. 原生 HTML5 video 标签

直接使用标准 HTML5 video 标签，支持 controls、autoplay、loop 等所有标准属性：

```html
<video src="./demo.mp4" controls width="100%" height="300"></video>
```

渲染效果：

<video src="./demo.mp4" controls width="100%" height="300"></video>

## 3. 多视频并排

配合多列排版，可实现视频并排展示：

[[columns:2]]
### 视频 A
[[video]]
./demo.mp4
[[/video]]

### 视频 B
[[video]]
./demo.mp4
[[/video]]
[[/columns]]

## 4. 注意事项

- 视频文件路径可以是相对路径或绝对 URL
- 建议为视频提供多种格式（mp4、webm）以保证浏览器兼容性
- 使用 `controls` 属性显示播放控件
- 使用 `autoplay` 属性可实现自动播放（部分浏览器受限）
</textarea>
            </div>
        </div>
        <script src="js/jquery.min.js"></script>
        <script src="../editormd.js"></script>
        <script>
            $(function() {
                editormd("test-editormd", {
                    width: "90%", height: 700, path: "../lib/",
                    theme: "default", previewTheme: "default", editorTheme: "default",
                    codeFold: true, saveHTMLToTextarea: true, searchReplace: true,
                    watch: true, htmlDecode: "style,script,iframe|on*",
                    taskList: true, tex: true,
                    flowChart: true, sequenceDiagram: true,
                    onload: function() { console.log("Video 示例已加载完成"); }
                });
            });
        </script>
    </body>
</html>
