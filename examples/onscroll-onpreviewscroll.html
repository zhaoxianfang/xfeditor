<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="utf-8" />
        <title>Onscroll / Onpreviewscroll - xfEditor 同步滚动事件示例</title>
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="../css/editormd.min.css" />
        <link rel="shortcut icon" href="../images/logos/favicon-32x32.ico" type="image/x-icon" />
        <style>
            .event-log {
                margin: 10px 0;
                padding: 12px 18px;
                border-radius: 6px;
                font-family: monospace;
                font-size: 13px;
                background: #1e1e1e;
                color: #d4d4d4;
                max-height: 200px;
                overflow-y: auto;
                border: 1px solid #333;
            }
            .event-log .entry { padding: 2px 0; border-bottom: 1px solid #333; }
            .event-log .scroll-event { color: #4ec9b0; }
            .event-log .preview-event { color: #ce9178; }
            .event-log .side-event { color: #569cd6; }
            .event-log .time { color: #808080; }
        </style>
    </head>
    <body>
        <div id="layout">
            <header>
                <h1>Onscroll / Onpreviewscroll 事件处理</h1>
                <p>在左侧或右侧编辑窗口滚动鼠标，查看实时事件日志</p>
            </header>
            <div class="event-log" id="event-log">
                <div class="entry"><span class="time">等待事件...</span></div>
            </div>
            <div id="test-editormd">
                <textarea style="display:none;">### 同步滚动事件测试

#### Settings

```javascript
{
    onscroll : function(event) {
        // 编辑区滚动时触发
        console.log("编辑区滚动");
    },
    onpreviewscroll : function(event) {
        // 预览区滚动时触发
        console.log("预览区滚动");
    },
    onactivesidechange : function(side) {
        // 活动侧切换时触发
        // side: "left" | "right" | null
        console.log("活动侧:", side);
    }
}
```

在**左侧编辑区**滚动鼠标 → 触发 `onscroll` 事件 + 同步到预览区
在**右侧预览区**滚动鼠标 → 触发 `onpreviewscroll` 事件 + 同步到编辑区
在编辑区**输入/粘贴/键盘操作** → 标记活动侧为 "left"
在预览区**点击交互**（表格、图片、Tabs）→ 标记活动侧为 "right"
**3秒无操作** → 活动侧重置为 null
</textarea>
            </div>
        </div>
        <script src="js/jquery.min.js"></script>
        <script src="../editormd.min.js"></script>
        <script type="text/javascript">
            var testEditor;
            var logCount = 0;
            var maxLogEntries = 50;
            
            function addLog(className, message) {
                var now = new Date();
                var time = now.toTimeString().split(' ')[0];
                var $log = $('#event-log');
                logCount++;
                
                var $entry = $('<div class="entry"></div>')
                    .append('<span class="time">[' + time + ']</span> ')
                    .append('<span class="' + className + '">' + message + '</span>');
                
                $log.prepend($entry);
                
                // 限制日志数量
                if (logCount > maxLogEntries) {
                    $log.find('.entry:last').remove();
                    logCount--;
                }
            }
            
            $(function() {
                $.get("./test.md", function(md){
                    testEditor = editormd("test-editormd", {
                        width  : "90%",
                        height : 640,
                        appendMarkdown : md,
                        path   : "../lib/",
                        
                        onscroll : function(event) {
                            addLog("scroll-event", "📜 编辑区滚动 → 同步到预览区");
                        },
                        
                        onpreviewscroll : function(event) {
                            addLog("preview-event", "👁 预览区滚动 → 同步到编辑区");
                        },
                        
                        onactivesidechange : function(side) {
                            var sideLabel = side === "left" ? "◀ 左侧编辑区" :
                                           side === "right" ? "▶ 右侧预览区" :
                                           "○ 无活动（自动重置）";
                            addLog("side-event", "🔀 活动侧切换: " + sideLabel);
                        }
                    });
                });
            });
        </script>
    </body>
</html>
