<!DOCTYPE html>
<html lang="zh">
    <head>
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon">
        <meta charset="utf-8" />
        <title>动态创建 xfEditor - xfEditor examples</title>
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="../css/xf_editor.min.css" />
    </head>
    <body>
        <div id="layout">
            <header>
                <h1>动态创建 xfEditor</h1>
                <p>Dynamic create xfEditor</p>
                <br/>
                <div class="btns" style="margin:0;">
                    <button id="create-btn">动态创建一个 xfEditor</button>
                    <button id="remove-btn">移除 xfEditor</button>
                </div>
            </header>
        </div>
        
        <script src="js/jquery.min.js"></script> 
        <script type="text/javascript">
            var testXfEditor;
            
            $(function() {                
                $("#create-btn").click(function(){                    
					$.getScript("../xf_editor.min.js", function() {
                        $("#layout").append("<div id=\"test-xfEditor\"></div>");
                        
                        testXfEditor = xfEditor("test-xfEditor", {
                            width: "90%",
                            height: 640,
                            markdown : "### 动态创建 xfEditor\r\n\r\nDynamic create xfEditor",
                            path : '../lib/'
                        });
					});
                });  
                
                $("#remove-btn").click(function() {
                    testXfEditor.editor.remove();
                });
            });
        </script>
    </body>
</html>
