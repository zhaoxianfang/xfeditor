        <style>
            .intro { width: 90%; margin: 15px auto; padding: 15px 20px; background: #f5f7fa; border-left: 4px solid #2196F3; border-radius: 4px; font-size: 14px; line-height: 1.8; color: #555; }

    <body>
        <div id="layout">
            <header>
                <h1>字体大小 示例</h1>
                <p>使用 <code>!字号 文本!</code> 语法自定义文字大小（8-200px）</p>
            </header>

            <div class="intro">
                <h2>使用说明</h2>
                <p>使用 <code>!数字 文本!</code> 语法，数字代表字号（px），范围 <strong>8-200px</strong>。</p>
                <p>超出范围的值会被忽略，文本保持原样。可与 Markdown 内联语法（粗体、斜体等）组合使用。</p>
            </div>

            <div id="test-editormd">
                <textarea style="display:none;"># 字体大小示例

## 一、基础字号演示

!8 这是 8px 的超小字!

!10 这是 10px 的极小字!

!12 这是 12px 的小字!

!14 这是 14px 的较小字!

!16 这是 16px 的正常文字（默认大小）!

!18 这是 18px 的略大字!

!20 这是 20px 的较大字!

!24 这是 24px 的大号文字!

!28 这是 28px 的超大文字!

!32 这是 32px 的标题级文字!

!36 这是 36px 的大标题!

!48 这是 48px 的巨幅标题!

!64 这是 64px 的海报级文字!

---

## 二、实用场景

### 合同条款

!10 本协议最终解释权归甲方所有。!

!10 如发生争议，双方应协商解决；协商不成的，可向有管辖权的人民法院提起诉讼。!

### 正文排版

!16 这里是标准的正文内容，适合大多数阅读场景。使用合适的字号可以有效提升阅读舒适度，减少视觉疲劳。!

!16 xfEditor 支持通过简单的语法灵活控制文字大小，让排版更加自由和专业。!

### 强调与提示

!20 **重要提示**：请仔细阅读以下内容，这关系到您的权益保障。!

!24 ⚠️ 警告：此区域包含重要安全信息，请勿跳过。!

### 标题和展示

!36 限时特惠!

!28 全场五折起，错过再等一年!!

!48 新品上市!

---

## 三、与 Markdown 内联语法组合

### 粗体 + 字号

!16 **这是 16px 的粗体**!

!24 **这是 24px 的大号粗体**!

### 斜体 + 字号

!16 *这是 16px 的斜体*!

!20 *这是 20px 的大号斜体*!

### 行内代码 + 字号

!16 使用 `editormd.init()` 初始化编辑器!

### 混合使用

!16 这段文字中 !24 有大字! 也有 **!20 大号粗体!** 和 !12 小字（注释）! ，排版非常灵活!

---

## 四、边界情况

### 超出范围（应忽略）

!5 这个字号太小（5px），会被忽略!

!250 这个字号太大（250px），也会被忽略!

### 超长文本（上限 1000 字符）

!16 正常的短文本，字号语法工作正常。!

### 嵌套空格

!48 Hello World!

!20 xfEditor — Powerful Markdown Editor!
