## 快速入门

xfEditor 是一款功能强大的开源 Markdown 在线编辑器，支持：

- **实时预览** — 编辑与预览同步滚动
- **扩展语法** — KaTeX 公式、ECharts 图表、Tabs 标签页、多列排版
- **表格编辑** — 预览区点击表格单元格即可插入/删除行列
- **图片缩放** — 拖拽预览区图片边角调整尺寸
- **TOC 目录** — 自动生成文章目录导航
- **安全防护** — XSS 过滤、HTML 标签解析控制

## 代码示例

```javascript
// 斐波那契数列生成器
function* fibonacci(n) {
    let [a, b] = [0, 1];
    for (let i = 0; i < n; i++) {
        yield a;
        [a, b] = [b, a + b];
    }
}
```

> 提示：这是一个最简配置示例，仅启用了基础功能。要使用扩展功能（公式、图表、标签页等），请在初始化配置中添加对应选项。
