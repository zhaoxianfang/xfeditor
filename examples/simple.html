<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="utf-8" />
        <title>xfEditor v1.17.15 — Simple example</title>
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="../css/xf_editor.min.css" />
        <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon" />
    </head>
    <body>
        <div id="layout">
            <header>
                <h1>Simple example — xfEditor v1.17.18</h1>
            </header>
            <form  method="post" id="formTest">

            
            <div id="test-xfEditor">
                <textarea style="display:none;"></textarea>
            </div>
            </form>
        </div>
        <script src="js/jquery.min.js"></script>
        <script src="../xf_editor.min.js"></script>
        <script type="text/javascript">
			var testEditor;

            $(function() {
                // 从 md/simple.md 加载演示内容
                $.get("md/simple.md", function(markdown) {
                    testEditor = xfEditor("test-xfEditor", {
                        width       : "90%",
                        height      : 640,
                        path        : "../lib/",
                        pluginPath  : "../plugins/",   // ★ 插件路径，工具栏弹窗功能必需
                        markdown    : markdown,         // 从外部 .md 文件加载内容
                        // 启用扩展功能以获得更好的演示效果
                        toc         : true,
                        taskList    : true,
                        tex         : true,
                        htmlDecode  : true
                    });
                }).fail(function() {
                    // 降级方案：使用内联内容
                    testEditor = xfEditor("test-xfEditor", {
                        width       : "90%",
                        height      : 640,
                        path        : "../lib/",
                        pluginPath  : "../plugins/",
                        markdown    : "# xfEditor v1.17.18\n\n## 快速入门\n\nxfEditor 是一款功能强大的开源 Markdown 在线编辑器。\n\n- **实时预览** — 编辑与预览实时同步\n- **扩展语法** — KaTeX 公式、ECharts 图表、Tabs 标签页\n\n> 提示：这是一个最简配置示例。要使用扩展功能，请在初始化配置中添加对应选项。"
                    });
                });
                
                /*
                // or
                testEditor = xfEditor({
                    id      : "test-xfEditor",
                    width   : "90%",
                    height  : 640,
                    path    : "../lib/"
                });
                */
            });
        </script>

        <script>
            const form = document.getElementById('formTest');

            // 监听表单提交事件
            form.addEventListener('submit', function(e) {
                // 阻止表单默认页面跳转提交
                e.preventDefault();

                console.log('表单触发提交了');

                // 快速获取表单所有数据
                const formData = new FormData(form);
                const data = Object.fromEntries(formData);
                console.log('表单数据：', data);

                // 在这里写ajax请求、校验逻辑等
            });
    </script>
    </body>
</html>
