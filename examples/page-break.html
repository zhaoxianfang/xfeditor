<!DOCTYPE html>
<html lang="zh">
    <head>
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon">
        <meta charset="utf-8" />
        <title>Page break - xfEditor examples</title>
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="../css/xf_editor.min.css" />
    </head>
    <body>
        <div id="layout">
            <header>
                <h1>Page break</h1>
            </header>
            <div class="btns">
                <button id="print-btn">Print Test</button>
                <button id="disabled-btn">Disabled</button>
                <button id="enabled-btn">Enabled</button>
            </div>
            <div id="test-xfEditor">
                <textarea style="display:none;">#### Syntax

    [At least 8 equals]

    [========]

#### Disabled

    {
        pageBreak : false
    }

#### Examples

[========]

> page start

#### xfEditor directory

    editor/
            lib/
            css/
            scss/
            tests/
            fonts/
            images/
            plugins/
            examples/
            languages/
            xf_editor.js
            ...

> page end
</textarea>
            </div>
        </div>
        <script src="js/jquery.min.js"></script>
        <script src="../xf_editor.min.js"></script>
        <script type="text/javascript">
			var testEditor;

            $(function() {
                testEditor = xfEditor("test-xfEditor", {
                    width   : "90%",
                    height  : 720,
                    path    : "../lib/"
                });
                
                $("#print-btn").click(function(){
                    var html = testEditor.getPreviewedHTML();
                    
                    document.write('<link rel="stylesheet" href="css/style.css" /><link rel="stylesheet" href="../css/xf_editor.min.css" />' + html);
                    window.print();
                });
                
                $("#disabled-btn").click(function(){
                    testEditor.config("pageBreak", false);
                });
                
                $("#enabled-btn").click(function(){
                    testEditor.config("pageBreak", true);
                });
            });
        </script>
    </body>
</html>
