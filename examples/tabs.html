## 基础用法

[[tabs]]
[[tab:产品介绍]]
Editor.md 是一款开源的、可嵌入的 Markdown 在线编辑器，基于 CodeMirror、jQuery 和 Marked 构建。

- 支持实时预览
- 支持图片上传
- 支持流程图和时序图
- 支持 ECharts 图表
[[/tab]]

[[tab:更新日志]]
### v1.7.0
- 新增 Apache ECharts 图表支持
- 新增 Tabs 标签页功能
- 新增多列排版功能
- 新增悬浮提示功能

### v1.6.0
- 新增拼音标注语法
- 新增文本对齐语法
- 新增图片尺寸编辑
- 新增表格行列操作
[[/tab]]

[[tab:使用帮助]]
欢迎使用 Editor.md！您可以通过工具栏快速插入各种 Markdown 元素，也可以使用键盘快捷键提高编辑效率。

1. **Ctrl + S** 保存内容
2. **F11** 切换全屏
3. **F10** 预览模式
[[/tab]]
[[/tabs]]
