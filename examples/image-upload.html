# 🖼️ 图片上传功能演示

---

## 一、功能概述

xfEditor v1.17.8 提供了完善的图片插入与上传功能：

| 功能 | 说明 |
|------|------|
| 📁 **本地上传** | 选择本地图片文件上传至服务器 |
| 📋 **粘贴上传** | 在对话框中直接 Ctrl+V 粘贴截图 |
| 🔗 **远程 URL** | 直接输入网络图片地址 |
| ✏️ **尺寸编辑** | 精确控制图片宽高 |
| 🌐 **跨域上传** | 通过 iframe + 回调实现跨域图片上传 |

---

## 二、支持的图片格式

| 格式 | 扩展名 | 说明 |
|------|--------|------|
| JPEG | `.jpg .jpeg` | 最通用的图片格式，适合照片 |
| PNG | `.png` | 支持透明背景，适合图标和截图 |
| GIF | `.gif` | 支持动图 |
| BMP | `.bmp` | Windows 位图格式 |
| WebP | `.webp` | Google 现代图片格式，更高压缩率 |
| SVG | `.svg` | 矢量图格式 |

---

## 三、使用方式

### 方式一：工具栏按钮

点击工具栏 **🖼️ 图片** 按钮，弹出图片对话框：

```markdown
![替代文本](图片URL)
![替代文本](图片URL "图片标题")
```

### 方式二：快捷键

`Ctrl+Shift+I` (Windows/Linux) 或 `Cmd+Shift+I` (Mac)

### 方式三：Markdown 语法直接输入

```markdown
![示例图片](https://example.com/image.jpg)
```

---

## 四、图片尺寸控制

### 语法格式

```markdown
![替代文本](图片URL)＜300,200＞
```

- `＜300,200＞` — 宽度 300px，高度 200px
- `＜800,＞` — 宽度 800px，高度自动
- `＜,400＞` — 高度 400px，宽度自动

### 带尺寸的图片示例

![xfEditor Logo](../images/logo.png)

![xfEditor Logo (放大)](../images/logo.png)＜128,128＞

---

## 五、粘贴上传功能

在图片对话框中，你可以直接 **Ctrl+V** 粘贴剪贴板中的图片：

1. 截取屏幕截图（或复制图片）
2. 打开图片对话框
3. **Ctrl+V** 粘贴
4. 系统自动上传

---

## 六、配置方式

### 启用本地上传

```javascript
xfEditor("editor-container", {
    path          : "../lib/",
    imageUpload   : true,                                    // 启用图片上传
    imageUploadURL: "php/upload.php",                        // 上传接口 URL
    imageFormats  : ["jpg", "jpeg", "gif", "png", "bmp", "webp"], // 允许的格式
    toolbarIcons  : function() {
        return ["image", /* ... */];  // 确保工具栏包含图片按钮
    }
});
```

### 启用跨域上传

```javascript
crossDomainUpload    : true,                                 // 启用跨域上传
uploadCallbackURL    : "php/upload_callback.html",           // 跨域回调页面
```

---

## 七、后端接口说明

| 项目 | 说明 |
|------|------|
| 请求方式 | `POST`（multipart/form-data） |
| 文件域名称 | `xf_editor-image-file` |
| 最大文件大小 | 5MB（默认，可配置 `max_size`） |
| 响应格式 | JSON |

### 成功响应
```json
{
    "success": 1,
    "message": "上传成功！",
    "url": "/examples/uploads/20240610_143025_12345.jpg",
    "data": {
        "file_name": "20240610_143025_12345.jpg",
        "file_size": 204800,
        "file_ext": "jpg"
    }
}
```

---

## 八、图片上传安全建议

1. ✅ **扩展名白名单** — 仅允许指定格式
2. ✅ **MIME 类型校验** — 防止扩展名伪造
3. ✅ **图片有效性验证** — 通过 getimagesize() 确认是真实图片
4. ✅ **文件大小限制** — 防止上传超大文件
5. ✅ **路径穿越防护** — 自动过滤文件名中的路径
6. ✅ **随机文件名** — 防止文件名冲突和目录遍历

> 💡 提示：本示例需要配置后端 `php/upload.php` 才能使用本地上传功能。
