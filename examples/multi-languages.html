<!DOCTYPE html>
<html lang="zh">
    <head>
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon">
        <meta charset="utf-8" />
        <title>多语言支持 - xfEditor examples</title>
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="../css/xf_editor.min.css" />
    </head>
    <body>
        <div id="layout">
            <header>
                <h1>多语言支持（l18n）</h1> 
                <p>multi-languages for l18n.
                    <select id="lang-select">
                        <option selected="selected">Languages</option>
                        <option value="en">English (en)</option>
                        <option value="zh-tw">繁體中文 (zh-tw)</option>
                        <option value="zh-cn">简体中文 (zh-cn)</option>
                    </select>
                </p>
            </header>
            <div id="test-xfEditor">
                <textarea style="display:none;">###多语言支持（l18n）

目前支持三种语言：简体中文、繁體中文、English，默认为简体中文 (zh-cn default)。

```html
&lt;!-- English --&gt;
&lt;script src="../dist/js/languages/en.js"&gt;&lt;/script&gt;

&lt;!-- 繁體中文 --&gt;
&lt;script src="../dist/js/languages/zh-tw.js"&gt;&lt;/script&gt;
```
</textarea>
            </div>
        </div>
        <script src="js/jquery.min.js"></script>
        <script src="../xf_editor.min.js"></script>
        <!--<script src="../languages/en.js"></script>
        <script src="../languages/zh-tw.js"></script> -->
        <script type="text/javascript">
            var testEditor;
            
            $(function() {
                testEditor = xfEditor("test-xfEditor", {
                    width: "90%",
                    height: 640,

                    path : '../lib/'
                });
                
                //console.log(xfEditor.defaults.lang); 
                var lang = "zh-cn";
                
                // 动态加载语言包
                // Dynamic load language package
                $("#lang-select").change(function() {
                    var value = $(this).val();
                    var path  = "../languages/";
                    
                    if (value == "zh-cn") 
                    {
                        location.reload();
                    } 
                    else
                    {                    
                        xfEditor.loadScript(path + value, function() {
                            // 使用 setLang 切换语言（会自动同步 this.lang 和 settings.lang，并重建工具栏）
                            testEditor.setLang(value);
                                    
                            // 整个编辑器重建，预览HTML会重新生成，出现闪动
                            //testEditor = xfEditor("test-xfEditor", {
                                //width: "90%",
                                //height: 640,
                                //path : '../lib/'
                            //});

                            lang = value;
                            console.log(lang, value, xfEditor.defaults.lang);                        
                        });
                    }
                });
            });
        </script>
    </body>
</html>
