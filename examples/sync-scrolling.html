<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="utf-8" />
        <title>xfEditor Markdown 编辑器 - 基础示例</title>
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="../css/editormd.min.css" />
        <link rel="shortcut icon" href="../images/logos/editormd-favicon-32x32.ico" type="image/x-icon" />
    </head>
    <body>
        <div id="layout">
            <header>
                <h1>Markdown 编辑器 - 基础示例</h1>
            </header>
            <div id="test-editormd">
                <textarea style="display:none;"># 编辑器示例

### 欢迎使用 xfEditor

这是一个功能丰富的 Markdown 在线编辑器。

默认支持：
- **加粗**、*斜体*、~~删除线~~
- 数学公式：$E = mc^2$
- 流程图、时序图
- 表格编辑
- 图片拖拽缩放
- 更多功能...
</textarea>
            </div>
        </div>
        <script src="js/jquery.min.js"></script>
        <script src="../editormd.min.js"></script>
        <script type="text/javascript">
            $(function() {
                var testEditor = editormd("test-editormd", {
                    width   : "90%",
                    height  : 640,
                    path    : "../lib/"
                });
            });
        </script>
    </body>
</html>
