## 六、多列排版

[[columns:3]]
### 第一栏
多列排版功能可以像报纸一样将内容分割为多个栏目展示，非常适合展示卡片式信息或并列内容。

- 自动均衡分布
- 支持全 Markdown 语法
- 响应式适配

### 第二栏
使用 `[ [columns:N] ]` 语法即可开启多栏排版（N 为栏数，如 2、3、4 等）。

如需在文本中显示字面量 `[ [columns:3] ]` 而不被解析，可使用反斜杠转义：`\[\[columns:3\]\]`。

> 提示：每一栏的内容都会独立渲染 Markdown，包括标题、列表、图片等。

### 第三栏
您可以在每一栏中放入不同的产品介绍、功能特性或服务说明，让读者一目了然。

1. 简洁的语法
2. 强大的兼容性
3. 美观的展示效果
[[/columns]]
