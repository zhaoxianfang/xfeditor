<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="utf-8" />
        <title>完整独立预览 - xfEditor v1.17.10</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="../css/xf_editor.preview.min.css" />
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon" />
        <style>
            #layout {
                padding-bottom: 60px;
            }
            .xfEditor-html-preview {
                width: 90%;
                margin: 0 auto;
                padding: 20px;
            }
            header {
                text-align: center;
                padding: 40px 0 20px;
            }
            header h1 {
                font-size: 28px;
                color: #333;
                margin-bottom: 8px;
            }
            header p {
                color: #666;
                font-size: 14px;
            }
        </style>
    </head>
    <body>
        <div id="layout">
            <header>
                <h1>xfEditor v1.17.10 完整独立预览</h1>
                <p>Full Preview Page — 内容由 <code>examples/md/full.md</code> 动态加载，演示所有 Markdown 扩展语法的渲染效果</p>
            </header>
            <div id="full-preview">
                <textarea style="display:none;" id="full-preview-source"></textarea>
            </div>
        </div>

        <!-- 
            预览 JS 加载方式（二选一）：
            
            方式一（推荐）：引入单个打包文件 xf_editor.preview.min.js
            只需 1 个 HTTP 请求，包含所有预览依赖（jQuery + marked + prettify + ... + xfEditor）
            <script src="../xf_editor.preview.min.js"></script>
            
            方式二（兼容旧模式）：分别引入各文件
            需要 10 个 HTTP 请求，适合按需加载或调试
        -->
        <!-- 方式二：分别引入（当前使用） -->
        <script src="js/jquery.min.js"></script>
        <script src="../lib/marked.min.js"></script>
        <script src="../lib/prettify.min.js"></script>
        <script src="../lib/raphael.min.js"></script>
        <script src="../lib/underscore.min.js"></script>
        <script src="../lib/sequence-diagram.min.js"></script>
        <script src="../lib/flowchart.min.js"></script>
        <script src="../lib/jquery.flowchart.min.js"></script>
        <script src="../lib/echarts.min.js"></script>
        <script src="../xf_editor.min.js"></script>
        <script type="text/javascript">
            $(function() {
                // 从 md/full.md 加载完整演示内容
                $.get("md/full.md", function(markdown) {
                    xfEditor.markdownToHTML("full-preview", {
                        markdown: markdown,     // 从外部 .md 文件加载
                        path: "../lib/",         // ★ 必须指定：examples/ 下默认 "./lib/" 指向错误路径
                        htmlDecode: true,
                        tocm: true,
                        taskList: true,
                        tex: true,
                        flowChart: true,
                        sequenceDiagram: true,
                        echarts: true,
                        tabs: true,
                        columns: true,
                        grid: true,
                        tooltip: true,
                        pinyin: true,
                        textAlign: true,
                        imageResize: true,
                        pageBreak: true,
                        atLink: true,
                        copybook: true,
                        pageBlock: true
                    });
                }).fail(function() {
                    // 降级：显示加载失败提示
                    $("#full-preview").html('<div style="text-align:center;padding:60px;color:#999;"><h2>⚠️ 无法加载 md/full.md</h2><p>请检查文件是否存在于 examples/md/ 目录下</p></div>');
                });
            });
        </script>
    </body>
</html>
