## 一、基础脚注

脚注由两部分组成：**引用** `[^脚注名]` 和 **定义** `[^脚注名]: 内容`。

这里有一个脚注引用[^example-basic]，点击数字可以跳转到脚注内容。这里还有另一个脚注[^example-second]。

[^example-basic]: 这是第一个脚注的内容——脚注定义可以写在文档的任何位置，最终都会统一显示在文档末尾。点击左边的 "↩" 可以跳回引用位置。

[^example-second]: 这是第二个脚注的内容。脚注编号按定义在文档中出现的顺序自动递增。

## 二、脚注内容支持内联格式

脚注定义中可以使用 **粗体**、*斜体*、`代码` 等简单的内联格式：

xfEditor[^editor-intro] 是一款强大的开源 Markdown 在线编辑器，本项目基于 pandao 的原版进行了深度改进和功能增强[^fork-info]。

[^editor-intro]: xfEditor 的核心依赖包括 **CodeMirror**（编辑器核心）、**Marked**（Markdown 解析器）、**KaTeX**（数学公式渲染）、**ECharts**（交互式图表）和 **FlowChart.js**（流程图）。项目采用 `MIT` 许可证。

[^fork-info]: 本分支在 v1.12.0 中新增了上标/下标 `^text^` / `^^text^^`、字体大小 `!32 文字!`、脚注系统 `[^name]`，并进行了大量的 Bug 修复和性能优化。

## 四、多个脚注同时使用

xfEditor[^fn-project] 支持多种 Markdown 扩展语法，包括：

- ECharts 图表渲染[^fn-echarts]
- Tabs 标签页组件[^fn-tabs]
- 多列排版 Columns[^fn-columns]
- 悬浮提示 Tooltip[^fn-tooltip]
- KaTeX 数学公式[^fn-katex]
- 脚注功能[^fn-footnote]

[^fn-project]: 项目地址：https://github.com/zhaoxianfang/xfeditor。采用 MIT 许可证，欢迎 Star 和贡献代码。

[^fn-echarts]: 支持柱状图、折线图、饼图、雷达图、漏斗图五种图表类型。使用 ` ```echarts ` 代码块语法。

[^fn-tabs]: 使用 `[[tabs]]...[[/tabs]]` 语法，标签内部可以嵌套代码块、表格、图表等任意 Markdown 内容。

[^fn-columns]: 使用 `[[columns:N]]...[[/columns]]` 语法实现报纸式多栏排版。N 为栏数（2/3/4 等）。

[^fn-tooltip]: 支持文本、图片、iframe 和 HTML 四种悬浮提示，使用 `[文本](tooltip:类型:内容)<宽,高>` 语法。

[^fn-katex]: 使用 `$...$` 行内公式或 `$$...$$` 块级公式。支持 LaTeX 常用语法，双击公式可定位到源码。

[^fn-footnote]: 即本文档示意的脚注系统。使用 `[^name]` 引用 + `[^name]: 内容` 定义，自动编号和汇总。

## 五、脚注与列表嵌套

以下列表项包含脚注引用：

1. 第一项：支持实时预览[^fn-preview] 和表格编辑[^fn-table]
2. 第二项：支持图片上传[^fn-upload] 和草稿暂存[^fn-draft]
3. 第三项：支持代码高亮[^fn-highlight] 和主题切换[^fn-theme]

[^fn-preview]: 编辑器左侧编辑区与右侧预览区实时同步渲染，所见即所得。

[^fn-table]: 点击预览区表格单元格，可弹出工具栏进行插入/删除行列操作。

[^fn-upload]: 支持本地文件拖拽上传和远程 URL 加载，支持跨域上传。

[^fn-draft]: 浏览器端自动保存草稿（localStorage），防止意外关闭导致内容丢失。

[^fn-highlight]: 支持 30+ 编程语言的语法高亮，使用 CodeMirror 和 prettify.js。

[^fn-theme]: 编辑区和预览区各自独立支持多种主题，可自由搭配切换。
