            <div class="intro">
                <h2>使用说明</h2>
                <p>使用 <code>{中文文本 | pin yin}</code> 语法，其中拼音用空格分隔每个音节，即可生成带有拼音注音的 HTML ruby 标签。</p>
                <p><strong>🆕 v1.17.9：</strong>拼音中支持嵌入脚注 <code>[^脚注名]</code>，脚注正上方显示 4 个 <code>&amp;nbsp;</code> 空白占位，保证每个字的上方都垂直对应一个拼音（或空格）。</p>
                <p>适合教育、出版、语言学习等场景。</p>
            </div>

            <div id="test-editormd">
                <textarea style="display:none;"># 拼音标注示例

## 基础用法

{xfEditor | biān jí qì} 是一款非常优秀的 {Markdown | mā kè dáo nà} 编辑器。

## 教育场景

{床前明月光 | chuáng qián míng yuè guāng}，

{疑是地上霜 | yí shì dì shàng shuāng}。

{举头望明月 | jǔ tóu wàng míng yuè}，

{低头思故乡 | dī tóu sī gù xiāng}。

## 🆕 拼音中嵌入脚注 (v1.17.9)

{疑[^yi]是地上[^shang]霜 | yí shì dì shàng shuāng}。

[^yi]: 疑：怀疑，疑虑。整句意为"怀疑是地上结了霜"。
[^shang]: 上：方位词，上面、上方。这里描写月光洒落在地面上的情景。

> 脚注上方的拼音区显示 4 个 &amp;nbsp; 空白占位符，保证每个字的正上方都垂直对应一个拼音（或空白占位）。

## 技术词汇

## 混合文本
