<!DOCTYPE html>
<html lang="zh">
    <head>
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon">
        <meta charset="utf-8" />
        <title>Read only mode - xfEditor examples</title>
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="../css/xf_editor.min.css" />
    </head>
    <body>
        <div id="layout">
            <header>
                <h1>只读模式</h1> 
                <p>Read only mode</p> 
            </header>
            <div class="btns">
                <button id="watch-btn">Enable watch</button>
                <button id="unwatch-btn">Disable watch</button>
            </div>
            <div id="test-xfEditor" class="xf_editor-onlyread">   
                <textarea style="display:none;">#### Setting

```javascript
{
    readOnly        : true,
    //styleActiveLine : false,       // disable active line
    //watch           : false,       // disable watch
    //lineNumbers     : false        // hide line numbers
}
```
</textarea>
            </div>
        </div>
        <script src="js/jquery.min.js"></script>
        <script src="../xf_editor.min.js"></script>   
        <script type="text/javascript">
			var testEditor;

            $(function() {
                testEditor = xfEditor("test-xfEditor", {
                    width           : "90%",
                    height          : 540,
                    path            : "../lib/",
                    //watch           : false,           // disable watch
                    readOnly        : true,
                    styleActiveLine : false,   // disable active line
                    //lineNumbers     : false      // hide line numbers
                });
                
                $("#watch-btn").click(function(){
                    testEditor.watch();
                });
                
                $("#unwatch-btn").click(function(){
                    testEditor.unwatch();
                });
            });
        </script>
    </body>
</html>
