<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Editor.md 完整示例</title>
    <link rel="stylesheet" href="../css/editormd.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="../editormd.min.js"></script>
    <script src="../languages/en.js"></script>
</head>
<body>
    <h1>Editor.md 完整功能示例</h1>

    <!-- ========== 示例 1：基础使用 ========== -->
    <h2>示例 1：基础编辑器</h2>
    <div id="editor-1">
        <textarea style="display:none;">### 基础编辑器

这是一个 Markdown 编辑器的基础使用示例。

- 支持实时预览
- 支持工具栏
- 支持文件上传</textarea>
    </div>
    <button onclick="getContent1()">获取内容</button>
    <button onclick="setLang1()">切换英文</button>
    <button onclick="destroy1()">销毁编辑器</button>
    <script>
        var editor1 = editormd("editor-1", {
            width    : "90%",
            height   : 400,
            path     : "../lib/",
            watch    : true
        });

        function getContent1() {
            alert("Markdown:\n" + editor1.getMarkdown());
        }
        function setLang1() {
            editor1.setLang("en");
        }
        function destroy1() {
            editor1.destroy();
            alert("编辑器已销毁！");
        }
    </script>

    <hr>

    <!-- ========== 示例 2：工具栏定制 ========== -->
    <h2>示例 2：自定义工具栏</h2>
    <div id="editor-2">
        <textarea style="display:none;">## 自定义工具栏

这个编辑器只显示简化的工具栏按钮。</textarea>
    </div>
    <script>
        editormd("editor-2", {
            width    : "90%",
            height   : 300,
            path     : "../lib/",
            toolbarIcons : function() {
                return ["bold", "italic", "|", "h1", "h2", "h3", "|",
                        "link", "image", "code", "|", "watch", "preview", "fullscreen"];
            }
        });
    </script>

    <hr>

    <!-- ========== 示例 3：图片上传 ========== -->
    <h2>示例 3：启用图片上传</h2>
    <div id="editor-3">
        <textarea style="display:none;">## 图片上传示例

点击工具栏的图片按钮，可以使用本地上传功能。</textarea>
    </div>
    <script>
        editormd("editor-3", {
            width    : "90%",
            height   : 300,
            path     : "../lib/",
            imageUpload      : true,
            imageUploadURL   : "/api/upload/image",
            imageFormats     : ["jpg", "jpeg", "gif", "png", "bmp", "webp"],
            crossDomainUpload: false
        });
    </script>

    <hr>

    <!-- ========== 示例 4：主题切换 ========== -->
    <h2>示例 4：主题切换</h2>
    <div id="editor-4">
        <textarea style="display:none;">## 主题切换

点击按钮切换编辑器主题。</textarea>
    </div>
    <button onclick="themeDefault()">默认主题</button>
    <button onclick="themeDark()">深色主题</button>
    <button onclick="themeMonokai()">Monokai 编辑主题</button>
    <script>
        var editor4 = editormd("editor-4", {
            width    : "90%",
            height   : 300,
            path     : "../lib/"
        });

        function themeDefault() {
            editor4.setTheme("default");
        }
        function themeDark() {
            editor4.setTheme("dark");
        }
        function themeMonokai() {
            editor4.setEditorTheme("monokai");
        }
    </script>

    <hr>

    <!-- ========== 示例 5：多语言 ========== -->
    <h2>示例 5：多语言切换</h2>
    <p>加载语言文件后，可动态切换编辑器语言。</p>
    <div id="editor-5">
        <textarea style="display:none;">## 多语言示例

切换语言后，工具栏 tooltip 会相应变化。</textarea>
    </div>
    <button onclick="langZhCN()">简体中文</button>
    <button onclick="langZhTW()">繁體中文</button>
    <button onclick="langEN()">English</button>
    <script>
        var editor5 = editormd("editor-5", {
            width    : "90%",
            height   : 300,
            path     : "../lib/"
        });

        function langZhCN() {
            editor5.setLang("zh-cn");
        }
        function langZhTW() {
            // 需要先加载语言文件
            if (editormd.getLang("zh-tw")) {
                editor5.setLang("zh-tw");
            } else {
                alert("请先加载 languages/zh-tw.js 语言文件");
            }
        }
        function langEN() {
            if (editormd.getLang("en")) {
                editor5.setLang("en");
            } else {
                alert("请先加载 languages/en.js 语言文件");
            }
        }
    </script>

    <hr>

    <!-- ========== 示例 6：事件监听 ========== -->
    <h2>示例 6：事件监听</h2>
    <div id="editor-6">
        <textarea style="display:none;">## 事件监听

打开浏览器控制台查看事件回调。</textarea>
    </div>
    <script>
        editormd("editor-6", {
            width    : "90%",
            height   : 300,
            path     : "../lib/",
            onload   : function() { console.log("[事件] 编辑器加载完成"); },
            onchange : function() { console.log("[事件] 内容发生变化"); },
            onscroll : function() { console.log("[事件] 编辑器滚动"); },
            onfullscreen : function() { console.log("[事件] 进入全屏"); },
            onfullscreenExit : function() { console.log("[事件] 退出全屏"); },
            onfocus : function() { console.log("[事件] 获得焦点"); },
            onblur : function() { console.log("[事件] 失去焦点"); }
        });
    </script>

    <hr>

    <!-- ========== 示例 7：只读模式 ========== -->
    <h2>示例 7：只读模式</h2>
    <div id="editor-7">
        <textarea style="display:none;">## 只读模式

这个编辑器的内容不能被编辑，但可以使用预览功能。</textarea>
    </div>
    <script>
        editormd("editor-7", {
            width    : "90%",
            height   : 300,
            path     : "../lib/",
            readOnly : true,
            toolbar  : false
        });
    </script>

    <hr>

    <!-- ========== 示例 8：草稿自动保存 ========== -->
    <h2>示例 8：草稿自动保存</h2>
    <div id="editor-8">
        <textarea style="display:none;">## 草稿自动保存

编辑器会每隔 30 秒自动保存草稿到浏览器 localStorage。

关闭页面后重新打开，可以恢复草稿。</textarea>
    </div>
    <button onclick="restoreDraft8()">恢复草稿</button>
    <button onclick="clearDraft8()">清除草稿</button>
    <script>
        var editor8 = editormd("editor-8", {
            width    : "90%",
            height   : 300,
            path     : "../lib/",
            draftAutoSave : true,
            draftInterval : 30,
            draftMaxDays  : 30
        });

        function restoreDraft8() {
            editor8.restoreDraft();
        }
        function clearDraft8() {
            editor8.clearDraft();
            alert("草稿已清除！");
        }
    </script>

    <hr>

    <!-- ========== 示例 9：ECharts 图表 ========== -->
    <h2>示例 9：ECharts 图表支持</h2>
    <div id="editor-9">
        <textarea style="display:none;">## ECharts 图表

启用 echarts 后，可使用工具栏插入图表：

```echarts
{
  "type": "bar",
  "title": {"text": "柱状图示例"},
  "xAxis": {"data": ["A", "B", "C", "D"]},
  "yAxis": {},
  "series": [{"type": "bar", "data": [5, 20, 36, 10]}]
}
```</textarea>
    </div>
    <script>
        editormd("editor-9", {
            width    : "90%",
            height   : 500,
            path     : "../lib/",
            echarts  : true
        });
    </script>

    <hr>

    <!-- ========== 示例 10：自定义语言包注册 ========== -->
    <h2>示例 10：注册自定义语言包</h2>
    <div id="editor-10">
        <textarea style="display:none;">## 自定义语言包

点击按钮切换为自定义语言。</textarea>
    </div>
    <button onclick="registerCustomLang()">注册并切换自定义语言</button>
    <script>
        var editor10 = editormd("editor-10", {
            width    : "90%",
            height   : 300,
            path     : "../lib/"
        });

        function registerCustomLang() {
            // 注册自定义语言包
            editormd.registerLang("custom", {
                name: "custom",
                toolbar: {
                    bold: "[粗体-Custom]",
                    italic: "[斜体-Custom]",
                    h1: "[标题1-Custom]",
                    link: "[链接-Custom]",
                    watch: "[预览-Custom]"
                },
                buttons: {
                    enter: "[确定]",
                    cancel: "[取消]",
                    close: "[关闭]",
                    confirm: "[确认]"
                }
            });
            editor10.setLang("custom");
            alert("自定义语言已注册并切换！");
        }
    </script>

    <hr>

    <!-- ========== 示例 11：Tabs 标签页 ========== -->
    <h2>示例 11：标签页语法</h2>
    <div id="editor-11">
        <textarea style="display:none;">## 标签页示例

[[tabs]]
[[tab:标签1]]
这是第一个标签页的内容。

可以包含 Markdown 内容。
[[/tab]]
[[tab:标签2]]
这是第二个标签页的内容。

- 支持列表
- 支持代码
[[/tab]]
[[/tabs]]</textarea>
    </div>
    <script>
        editormd("editor-11", {
            width    : "90%",
            height   : 400,
            path     : "../lib/",
            tabs     : true
        });
    </script>

    <hr>

    <!-- ========== 示例 12：多栏布局 ========== -->
    <h2>示例 12：多栏布局</h2>
    <div id="editor-12">
        <textarea style="display:none;">## 多栏布局示例

[[columns:2]]
**第一栏**

这是第一栏的内容。

**第二栏**

这是第二栏的内容。
[[/columns]]</textarea>
    </div>
    <script>
        editormd("editor-12", {
            width    : "90%",
            height   : 400,
            path     : "../lib/",
            columns  : true
        });
    </script>

    <hr>

    <!-- ========== 示例 13：悬浮提示 ========== -->
    <h2>示例 13：悬浮提示语法</h2>
    <div id="editor-13">
        <textarea style="display:none;">## 悬浮提示示例

将鼠标悬停在 [这里的文字](tooltip:这是悬浮提示的内容，支持**Markdown**) 上查看效果。

也可以使用简写：[[tooltip:这是另一个提示::这是提示的标题]]</textarea>
    </div>
    <script>
        editormd("editor-13", {
            width    : "90%",
            height   : 300,
            path     : "../lib/",
            tooltip  : true
        });
    </script>

</body>
</html>
