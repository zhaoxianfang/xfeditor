<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="utf-8" />
        <title>Apache ECharts 图表 - xfEditor v1.15.0</title>
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="../css/editormd.min.css" />
        <link rel="shortcut icon" href="../images/logos/editormd-favicon-32x32.ico" type="image/x-icon" />
        <style>
            .intro { width: 90%; margin: 15px auto; padding: 15px 20px; background: #f5f7fa; border-left: 4px solid #2196F3; border-radius: 4px; font-size: 14px; line-height: 1.8; color: #555; }
            .intro h2 { margin: 0 0 8px; font-size: 16px; color: #333; }
            .intro code { background: #e8e8e8; padding: 2px 6px; border-radius: 3px; font-family: Consolas, Monaco, monospace; font-size: 12px; color: #c7254e; }
        </style>
    </head>
    <body>
        <div id="layout">
            <header>
                <h1>ECharts 交互式图表示例</h1>
                <p>使用 <code>```echarts</code> 代码块语法插入 Apache ECharts 图表，支持柱状图、折线图、饼图、雷达图、漏斗图、树图/脑图等</p>
            </header>

            <div class="intro">
                <h2>使用说明</h2>
                <p>在 Markdown 中插入 <code>```echarts</code> 代码块，内部填写 ECharts 配置 JSON 即可实时渲染图表。</p>
                <p>本示例同时演示了工具栏下拉菜单快速插入图表模板的功能（点击工具栏 <i class="fa fa-bar-chart"></i> 图标）。</p>
            </div>

            <div id="test-editormd">
                <textarea style="display:none;"># ECharts 图表示例

## 柱状图

```echarts
{
  "type": "bar",
  "title": {"text": "月度销售额"},
  "xAxis": {"data": ["1月", "2月", "3月", "4月", "5月", "6月"]},
  "yAxis": {},
  "series": [{"type": "bar", "data": [120, 200, 150, 80, 70, 110]}]
}
```

## 折线图

```echarts
{
  "type": "line",
  "title": {"text": "用户增长趋势"},
  "xAxis": {"type": "category", "data": ["周一", "周二", "周三", "周四", "周五", "周六", "周日"]},
  "yAxis": {"type": "value"},
  "series": [{"type": "line", "data": [150, 230, 224, 218, 135, 147, 260], "smooth": true}]
}
```

## 饼图

```echarts
{
  "type": "pie",
  "title": {"text": "访问来源分布"},
  "series": [{
    "type": "pie",
    "radius": "55%",
    "data": [
      {"value": 1048, "name": "搜索引擎"},
      {"value": 735, "name": "直接访问"},
      {"value": 580, "name": "邮件营销"},
      {"value": 484, "name": "联盟广告"},
      {"value": 300, "name": "视频广告"}
    ]
  }]
}
```

## 雷达图

```echarts
{
  "type": "radar",
  "title": {"text": "能力评估模型"},
  "radar": {
    "indicator": [
      {"name": "销售", "max": 100},
      {"name": "管理", "max": 100},
      {"name": "信息技术", "max": 100},
      {"name": "客服", "max": 100},
      {"name": "研发", "max": 100},
      {"name": "市场", "max": 100}
    ]
  },
  "series": [{
    "type": "radar",
    "data": [
      {"value": [85, 90, 70, 80, 95, 75], "name": "预算分配"},
      {"value": [50, 40, 90, 60, 70, 80], "name": "实际开销"}
    ]
  }]
}
```

## 漏斗图

```echarts
{
  "type": "funnel",
  "title": {"text": "销售漏斗"},
  "series": [{
    "type": "funnel",
    "data": [
      {"value": 60, "name": "访问"},
      {"value": 40, "name": "咨询"},
      {"value": 20, "name": "订单"},
      {"value": 80, "name": "点击"},
      {"value": 100, "name": "展现"}
    ]
  }]
}
```


## 树图/脑图 🆕v1.15.0

```echarts
{
  "theme": "dark",
  "type": "tree",
  "height": 500,
  "title": {"text": "产品技术架构", "subtext": "点击节点圆圈可折叠/展开", "left": "center", "top": 10},
  "tooltip": {"trigger": "item", "triggerOn": "mousemove"},
  "series": [{
    "type": "tree",
    "data": [{
      "name": "🚀 智能中枢",
      "symbolSize": 18,
      "children": [{
        "name": "📊 数据分析",
        "itemStyle": {"color": "#4fc3f7"},
        "children": [
          {"name": "实时看板", "value": 95},
          {"name": "异常检测", "value": 88},
          {"name": "趋势预测", "value": 76}
        ]
      }, {
        "name": "🤖 AI 引擎",
        "itemStyle": {"color": "#81c784"},
        "children": [
          {"name": "NLP", "value": 92},
          {"name": "CV", "value": 85},
          {"name": "大语言模型", "value": 96}
        ]
      }, {
        "name": "⚙️ 基础设施",
        "itemStyle": {"color": "#ffb74d"},
        "children": [
          {"name": "云原生", "value": 90},
          {"name": "边缘计算", "value": 78},
          {"name": "安全合规", "value": 82}
        ]
      }]
    }],
    "layout": "orthogonal",
    "orient": "LR",
    "roam": true,
    "expandAndCollapse": true,
    "initialTreeDepth": 2,
    "top": "5%", "left": "3%", "bottom": "3%", "right": "8%",
    "symbol": "circle",
    "symbolSize": 14,
    "lineStyle": {"color": "rgba(255,255,255,0.15)", "width": 2, "curveness": 0.3},
    "edgeShape": "curve",
    "label": {"position": "left", "verticalAlign": "middle", "align": "right", "fontSize": 12, "color": "#e0e0e0"},
    "leaves": {"label": {"position": "right", "verticalAlign": "middle", "align": "left"}, "symbolSize": 8},
    "emphasis": {"focus": "descendant", "lineStyle": {"color": "#4a6cf7", "width": 3}},
    "nodePadding": 25, "nodeGap": 15,
    "animationDuration": 800
  }]
}
```

        <script src="js/jquery.min.js"></script>
        <script src="../editormd.min.js"></script>
        <script type="text/javascript">
            $(function() {
                editormd("test-editormd", {
                    width: "90%",
                    height: 800,
                    path: "../lib/",
                    theme: "default",
                    previewTheme: "default",
                    editorTheme: "default",
                    codeFold: true,
                    saveHTMLToTextarea: true,
                    searchReplace: true,
                    watch: true,
                    htmlDecode: "style,script,iframe|on*",

                    taskList: true,
                    tex: true,
                    flowChart: true,
                    sequenceDiagram: true,
                    echarts: true,
                    onload: function() {
                        console.log("ECharts 示例已加载完成");
                    }
                });
            });
