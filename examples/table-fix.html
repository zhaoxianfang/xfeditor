## 一、Bug 说明

在 marked.js v0.3.3 中，解析 pipe-table 时使用贪婪正则 `replace(/^ *\| *| *\| *$/g, "")`，当表格**最后一行最后一列为空**时，贪婪正则会吞掉前一列到行尾的全部内容，导致该行少一列，造成显示错位。

xfEditor v1.14.0 通过后处理函数 `fixTableEmptyCells()` 修复此 Bug：以 `thead` 列数为基准，自动补齐 `tbody` 中缺失的空 `td`。

---

## 二、修复前后对比

### 修复前（marked.js v0.3.3 Bug 导致）

下面这个表格在旧版本编辑器中会导致"格式"列缺失：

| 功能项 | 说明 | 格式 |
|--------|------|------|
| 代码高亮 | 30+语言支持 | .js, .ts, .py, .go |
| 图片上传 | 拖拽+粘贴上传 | .png, .jpg, .webp |
| 文件上传 | 附件管理 | .pdf, .doc, .zip |

**Bug 表现**：最后一行 `.pdf, .doc, .zip` 会向左错位到"说明"列，"格式"列消失。

**修复后** ✅：所有列正常对齐，空单元格自动补齐。

## 四、修复技术细节

| 修复项 | 方式 |
|--------|------|
| 修复函数 | `editormd.fixTableEmptyCells(html)` |
| 触发时机 | 所有渲染路径的后处理阶段 |
| 覆盖范围 | 主预览 / getHTML / standalone / markdownToHTML |
| 修复原理 | 以 `thead` 列数为基准，补齐 `tbody` 缺失的空 `td` |
| 性能影响 | 仅处理含 `table` 的 HTML，正则快速定位 |
