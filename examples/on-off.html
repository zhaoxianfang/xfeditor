<!DOCTYPE html>
<html lang="zh">
    <head>
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon">
        <meta charset="utf-8" />
        <title>On / Off (bind/unbind) event handle - xfEditor examples</title>
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="../css/xf_editor.min.css" />
    </head>
    <body>
        <div id="layout">
            <header>
                <h1>On / Off (bind/unbind) event handle</h1>
                <p>Plaese press F12, open the develop tools.</p>     
            </header>
            <div id="test-xfEditor">                
                <textarea style="display:none;">#### Example
```javascript
{
    onload : function() {
        this.off("resize"); // unbind before handle

        // Override settings.onresize
        this.on("resize", function(){
            console.clear();
            console.log("onresize =>", this, this.id, event, (new Date).getTime());
        });
    }
}

// Or
editor.on("resize", function(){
    // ...
});

editor.off("resize");
```

</textarea>
            </div>
        </div>        
        <script src="js/jquery.min.js"></script>
        <script src="../xf_editor.min.js"></script>
        <script type="text/javascript">
            var testEditor;
            
            $(function() {
                $.get("md/full.md", function(md){
                    testEditor = xfEditor("test-xfEditor", {
                        width    : "90%",
                        height   : 720,
                        appendMarkdown : md,
                        path     : '../lib/',
                        tex      : true,
                        htmlDecode : true,
                        flowChart : true,
                        taskList  : true,
                        sequenceDiagram : true,
                        onload : function() {
                            this.off("resize");
                            });
                            
                            // defined event bind
                            this.on("resize", function(){
                                console.clear();
                                console.log("onresize =>", this, this.id, event, (new Date).getTime());
                            });
                        }
                    });
                });
            });
        </script>
    </body>
</html>
