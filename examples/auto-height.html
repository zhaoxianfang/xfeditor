<!DOCTYPE html>
<html lang="zh">
    <head>
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon">
        <meta charset="utf-8" />
        <title>Auto height - xfEditor examples</title>
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="../css/xf_editor.min.css" />
    </head>
    <body>
        <div id="layout">
            <header>
                <h1>Auto height test</h1>
            </header>
            <div class="btns">
                <button id="append-btn">Append markdown</button>
            </div>
            <div id="test-xfEditor">
                <textarea style="display:none;">### Settings

```javascript
var testEditor = xfEditor("test-xfEditor", {
    autoHeight : true
});
```
</textarea>
            </div>
        </div>
        <script src="js/jquery.min.js"></script>
        <script src="../xf_editor.min.js"></script>
        <script type="text/javascript">
			var testEditor;

            $(function() {
                testEditor = xfEditor("test-xfEditor", {
                    width           : "90%",
                    autoHeight      : true,
                    path            : "../lib/",
                    htmlDecode      : "style,script,iframe", 
                    tex             : true,

                    taskList        : true,
                    flowChart       : true, 
                    sequenceDiagram : true
                });
                
                $("#append-btn").click(function(){
                    $.get("md/full.md", function(md){
                        testEditor.appendMarkdown(md);
                    });
                });
            });
        </script>
    </body>
</html>
